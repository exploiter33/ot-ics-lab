{% extends "base.html" %}
{% block title %}Login — OT-ICS Lab{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-75 align-items-center">
    <div class="col-md-6 col-lg-4">
        <div class="card bg-dark-subtle border-secondary">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="display-4 mb-3"><i class="bi bi-shield-lock-fill text-danger"></i></div>
                    <h4>Lab Access</h4>
                    <p class="text-secondary small">Enter a username to begin or continue your training.</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                               placeholder="e.g., operator42" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Enter Lab
                    </button>
                </form>

                <div class="alert alert-warning mt-4 mb-0 small py-2">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    No password required — this is a single-user educational lab.
                    Never expose this lab to any network.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
