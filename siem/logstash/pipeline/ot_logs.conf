input {
  tcp {
    port => 5000
    codec => json
    type => "ot-log"
  }
  udp {
    port => 5000
    codec => json
    type => "ot-log"
  }
  http {
    port => 5001
    codec => json
  }
}

filter {
  if [type] == "ot-log" {
    mutate {
      add_tag => ["ot-lab", "collected"]
    }

    if [event][severity] == "critical" or [event][severity] == "high" {
      mutate {
        add_tag => ["alert", "high-priority"]
      }
    }
  }

  # Add geoip if source IP exists
  if [source][ip] {
    # Skip geoip for RFC1918 addresses to avoid errors
    if [source][ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)/ {
      geoip {
        source => "[source][ip]"
        target => "geoip"
      }
    }
  }

  date {
    match => ["@timestamp", "ISO8601", "UNIX"]
  }

  # Apply OT-specific processing
  if [network][protocol] {
    mutate {
      add_field => {
        "[ot][protocol]" => "%{[network][protocol]}"
        "[ot][zone]" => "%{[network][transport]}"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ot-lab-%{+YYYY.MM.dd}"
    ecs_compatibility => "v8"
  }

  stdout {
    codec => rubydebug { metadata => false }
  }
}
